<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Client Jeu RPG</title>

    <link rel="stylesheet" href="style-ui.css">
</head>

<body>

<h1>Jeu RPG</h1>

<!-- LOGIN -->
<div id="loginPanel" class="panel">

    <h2>Connexion</h2>

    <input id="loginUser" placeholder="Nom d'utilisateur">

    <input id="loginPass"
           type="password"
           placeholder="Mot de passe">

    <button onclick="login()">
        Se connecter
    </button>

    <p>
        Pas de compte ?
        <a href="#"
           onclick="showRegister()">
            Créer un compte
        </a>
    </p>

</div>

<!-- REGISTER -->
<div id="registerPanel"
     class="panel"
     style="display:none;">

    <h2>Créer un compte</h2>

    <input id="regUser"
           placeholder="Nom d'utilisateur">

    <input id="regPass"
           type="password"
           placeholder="Mot de passe">

    <button onclick="register()">
        Créer le compte
    </button>

    <p>
        Déjà un compte ?
        <a href="#"
           onclick="showLogin()">
            Se connecter
        </a>
    </p>

</div>

<!-- CHARACTER -->
<div id="characterPanel"
     class="panel"
     style="display:none;">

    <h2>Vos personnages</h2>

    <div id="charList"></div>

    <button onclick="showCreateCharacter()">
        Créer un personnage
    </button>

    <button onclick="logout()"
            class="dangerBtn">
        Déconnexion
    </button>

</div>

<!-- CREATE CHARACTER -->
<div id="createCharacterPanel"
     class="panel"
     style="display:none;">

    <h2>Créer un personnage</h2>

    <input id="charName"
           placeholder="Nom du personnage">

    <select id="charClassSelect"
            onchange="updatePreview()">

        <option>Guerrier</option>
        <option>Mage</option>
        <option>Archer</option>
        <option>Nécromancien</option>

    </select>

    <input id="charColor"
           type="color"
           value="#ff0000"
           oninput="updatePreview()">

    <div id="previewBox">

        <div id="charSprite"
             class="charSprite">

            <div class="charAura"></div>
            <div class="charBody"></div>
            <div class="charHead"></div>
            <div class="charWeapon"></div>
            <div class="charStaff"></div>
            <div class="charBow"></div>

        </div>

    </div>

    <button onclick="createCharacter()">
        Créer
    </button>

    <button onclick="showCharacters()">
        Retour
    </button>

</div>

<!-- INSTANCES -->
<div id="instancePanel"
     class="panel"
     style="display:none;">

    <h2>Instances</h2>

    <div id="instanceList"></div>

</div>

<!-- GAME -->
<div id="gamePanel"
     style="display:none;">

    <!-- MAP -->
    <div id="mapContainer">
        <div id="gameWorld"></div>
        <div id="playerSprite" class="playerSprite ..."></div>
    </div>

    <!-- UI BAS -->
    <div id="bottomUI">

        <!-- CHAT -->
        <div id="chatSection">

            <h3>Chat</h3>

            <div id="chatBox"></div>

            <input id="chatInput"
                   placeholder="Message...">

            <button onclick="sendChatMessage()">
                Envoyer
            </button>

        </div>

        <!-- HUD -->
        <div id="hudSection">

            <h3>Personnage</h3>

            <div id="hud">

                <div>
                    Nom :
                    <span id="hudName"></span>
                </div>

                <div>
                    Classe :
                    <span id="hudClass"></span>
                </div>

                <div>
                    Niveau :
                    <span id="hudLevel"></span>
                </div>

                <div>
                    HP :
                    <span id="hudHp"></span>
                </div>

                <div>
                    Mana :
                    <span id="hudMana"></span>
                </div>

                <div>
                    Force :
                    <span id="hudStr"></span>
                </div>

                <div>
                    Agilité :
                    <span id="hudAgi"></span>
                </div>

                <div>
                    Intelligence :
                    <span id="hudInt"></span>
                </div>

            </div>

        </div>

        <!-- OPTIONS -->
        <div id="optionsSection">

            <button onclick="returnToCharacterSelect()">
                Retour personnages
            </button>

            <button onclick="logout()"
                    class="dangerBtn">
                Déconnexion
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
